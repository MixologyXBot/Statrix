# Statrix Endpoint - URL of your Statrix installation
# Example: STATRIX_ENDPOINT=https://your-statrix.example
# Example: STATRIX_ENDPOINT=http://localhost:8000
STATRIX_ENDPOINT=

# Server ID - automatically assigned on installation, do not change this
# DO NOT share this ID with anyone
SID=

# Network Interfaces
# * if you leave this setting empty our agent will detect and monitor all of your active network interfaces
NetworkInterfaces=

# Check Services
# * separate process or service names by comma (,) with a maximum of 10 services to be monitored (i.e., notepad++.exe,Dhcp,TermService)
# * NOTE: this will only check if the process/service is running, not its functionality
CheckServices=

# Port Connections
# * if left empty, the agent will auto-detect active listening TCP ports on the system and track their connection counts
# * to monitor specific ports, list them separated by comma (e.g., 80,443,3306)
ConnectionPorts=

# Check Drive Health
# * checks the health of any found drives on the system
# * 0 - OFF (default) | 1 - ON
CheckDriveHealth=0

# How frequently should data samples be collected
# * we don't recommend setting this value lower than 2 and higher than 10
# * increasing this value can help reduce the agent's resource usage on low-spec systems
# * the higher the value, the less accurate the metrics will be
CollectEveryXSeconds=3

# DEBUG Mode
# * if enabled, the agent will output debug information to the log file located at C:\Program Files\Statrix\debug.log
# * 0 - OFF (default) | 1 - ON
# * WARNING: enabling this will generate a lot of log data, only enable this if you're having issues with the agent
DEBUG=0

# Outgoing PING
# * if enabled, the agent will perform outgoing PING tests towards the given targets (10 max)
# * format is: "TargetName1,TargetIP1|TargetName2,TargetIP2" example: "Google,8.8.8.8|Cloudflare,1.1.1.1|InternalRouter,192.168.1.1|InternalServer,192.168.1.10"
# * allowed target name characters: alphanumerics, dots (.), dashes (-), underscores (_)
OutgoingPings=

# Outgoing PING count
# * if OutgoingPings is enabled, this is the number of packets to send for each PING test
# * default is 20 | acceptable values are 10-40
OutgoingPingsCount=20
