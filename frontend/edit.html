<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Statrix</title>
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/public.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <img src="/static/images/logo.png" alt="Statrix" class="logo">
                <h1>Statrix</h1>
                <p class="subtitle">by HellFireDevil18</p>
            </div>

            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="admin@example.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="error-message hidden" id="error-message">
                    Invalid email or password
                </div>

                <button type="submit" class="btn btn-primary" id="login-button">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader hidden">
                        <span class="spinner-small"></span>
                    </span>
                </button>
            </form>

            <p class="login-footer">
                <a href="/">← Back to Status Page</a>
            </p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
